name: Type, Lint Check

on:
  pull_request:
    branches:
      - main

jobs:
  run-tsc:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: TS check
        run: bun run tsc

      - name: Check lint
        run: bun run lint
