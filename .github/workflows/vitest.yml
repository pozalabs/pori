name: Vitest

on:
  pull_request:
    branches:
      - main

jobs:
  run-vitest:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set pnpm
        uses: pnpm/action-setup@v4

      - name: Use Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20.x'

      - name: Create .npmrc file
        run: |
          cat << EOF > .npmrc
          @pozalabs:registry=https://npm.pkg.github.com
          //npm.pkg.github.com/:_authToken=${{ secrets.NPM_AUTH_TOKEN }}
          EOF

      - name: Install dependencies
        run: pnpm install

      - name: Run vitest
        run: pnpm test
