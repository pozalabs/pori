name: Vitest

on:
  pull_request:
    branches:
      - main

jobs:
  run-tsc:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Use Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20.x'

      - name: Create .yarnrc.yml file
        run: |
          cat << EOF > .yarnrc.yml
          yarnPath: .yarn/releases/yarn-4.3.1.cjs
          nodeLinker: pnp
          enableGlobalCache: false
          EOF

      - name: Install dependencies
        run: yarn install

      - name: Run vitest
        run: yarn test
