[[repos]]
repo = "local"
hooks = [
  { id = "prettier", name = "Prettier", language = "system", entry = "bunx prettier --write --cache --ignore-unknown", files = "\\.(js|jsx|ts|tsx|css|json|yaml)$" },
  { id = "eslint", name = "ESLint", language = "system", entry = "bunx eslint --fix --max-warnings 0", files = "\\.(ts|tsx)$" },
  { id = "tsc", name = "TypeScript", language = "system", entry = "bunx tsc --noEmit", pass_filenames = false, files = "\\.(ts|tsx)$" },
]
